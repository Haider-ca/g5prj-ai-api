<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Haven</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body data-page="admin-dashboard">
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="./index.html">Haven</a>
      <nav class="topbar-nav">
        <span id="currentAdminLabel" class="nav-pill">Loading admin...</span>
        <button id="logoutButton" class="button button-ghost" type="button">Logout</button>
      </nav>
    </header>

    <main class="dashboard-layout">
      <section class="card card-accent dashboard-summary">
        <p class="eyebrow">Admin Dashboard</p>
        <h1>Usage monitor</h1>
        <p class="lead">Inspect user accounts and API consumption from the auth service.</p>

        <dl class="metrics-grid">
          <div class="metric-card">
            <dt>Role</dt>
            <dd>Admin</dd>
          </div>
          <div class="metric-card">
            <dt>User records</dt>
            <dd id="userCountValue">--</dd>
          </div>
          <div class="metric-card">
            <dt>Visibility</dt>
            <dd>Auth service usage summary</dd>
          </div>
        </dl>
      </section>

      <section class="card card-panel admin-panel">
        <div class="section-heading">
          <h2>User usage overview</h2>
          <button id="refreshUsersButton" class="button button-secondary" type="button">Refresh users</button>
        </div>
        <p id="adminMessage" class="feedback-message" aria-live="polite"></p>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Email</th>
                <th>Role</th>
                <th>Remaining Calls</th>
                <th>Usage Count</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="4">No data loaded yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./assets/js/pages/admin-dashboard-page.js"></script>
</body>
</html>
